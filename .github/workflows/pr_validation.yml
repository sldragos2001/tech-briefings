name: PR Validation CI

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/**'

jobs:
  syntax-and-deps-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python Syntax Check (py_compile)
        run: |
          # Verifica codul la nivel de AST (Abstract Syntax Tree) fara sa-l execute
          python3 -m py_compile scripts/email_momentum_calculator.py
