name: Daily Tech Briefing (GCP Native)

on:
  schedule:
    - cron: '58 8 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # Necesar pentru OIDC

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PROJECT_ID: "project-f90c6781-8350-497f-bc7"
      LOCATION: "europe-west3"
      WORKLOAD_IDENTITY_PROVIDER: "projects/832877221895/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      SERVICE_ACCOUNT: "briefing-generator@project-f90c6781-8350-497f-bc7.iam.gserviceaccount.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate Briefing via Vertex AI
        shell: bash
        run: |
          set -euo pipefail
          
          # Construim JSON-ul folosind jq pentru a evita erori de citare (escaping)
          PROMPT_DATA=$(jq -n \
            --arg prompt "Act as a senior engineering analyst. Generate a tech briefing for AI, Cloud Computing, and DevOps. 2 items each. Language: English. Format: Markdown. Target 450-650 words. Include TL;DR. Today is $(date +%F)." \
            '{
              contents: [{ parts: [{ text: $prompt }] }],
              generationConfig: { maxOutputTokens: 1024, temperature: 0.2 }
            }')

          # Apelul API - ATENȚIE la închiderea parantezei la final
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PROMPT_DATA" \
            "https://${{ env.LOCATION }}-aiplatform.googleapis.com/v1/projects/${{ env.PROJECT_ID }}/locations/${{ env.LOCATION }}/publishers/google/models/gemini-1.5-flash:generateContent")

          # Verificăm dacă răspunsul conține erori
          if echo "$RESPONSE" | jq -e '.error' > /dev/null; then
            echo "GCP API Error detected:"
            echo "$RESPONSE" | jq '.'
            exit 1
          fi

          # Extragem textul (formatul Unary este mai stabil pentru CI/CD)
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty' > briefing_output.md

          # Verificăm dacă fișierul este gol
          if [ ! -s briefing_output.md ]; then
            echo "Error: Generated briefing is empty. API Response was:"
            echo "$RESPONSE"
            exit 1
          fi

      - name: Commit and Push
        shell: bash
        run: |
          set -euo pipefail
          DATE_PATH="briefings/$(date +%Y/%m)"
          mkdir -p "$DATE_PATH"
          mv briefing_output.md "$DATE_PATH/$(date +%F).md"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DATE_PATH"
          git commit -m "docs: daily briefing $(date +%F)" || exit 0
          git push
