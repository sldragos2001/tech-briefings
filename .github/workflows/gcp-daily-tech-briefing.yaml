name: Daily Tech Briefing (GCP Native)

on:
  schedule:
    - cron: '58 8 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # Necesar pentru OIDC

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PROJECT_ID: "project-f90c6781-8350-497f-bc7"
      LOCATION: "europe-west1"
      WORKLOAD_IDENTITY_PROVIDER: "projects/832877221895/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      SERVICE_ACCOUNT: "briefing-generator@project-f90c6781-8350-497f-bc7.iam.gserviceaccount.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate Briefing via Vertex AI
        shell: bash
        run: |
          set -euo pipefail
          
          # 1. Datele tale oficiale din 2026
          PROJECT_ID="project-f90c6781-8350-497f-bc7"
          PROJECT_NUMBER="832877221895"
          # Rămânem pe us-central1 pentru că acolo s-a născut Gemini 2.0
          LOCATION="us-central1"
          # ACESTA este ID-ul din screenshot-ul tău:
          MODEL_ID="gemini-2.0-flash-001"

          echo "🚀 Generăm briefing-ul cu $MODEL_ID în $LOCATION..."

          # 2. Payload pentru Gemini 2.0
          # Am adăugat safetySettings la BLOCK_NONE ca să nu avem surprize
          PROMPT_DATA=$(jq -n \
            --arg prompt "Act as a senior engineering analyst. Generate a tech briefing for AI, Cloud Computing, and DevOps. 2 items each. Language: English. Format: Markdown. Target 450-650 words. Include TL;DR. Today is $(date +%F)." \
            '{
              contents: [{ parts: [{ text: $prompt }] }],
              generationConfig: { 
                maxOutputTokens: 2048, 
                temperature: 0.1 
              },
              safetySettings: [
                { category: "HATE_SPEECH", threshold: "BLOCK_NONE" },
                { category: "HARASSMENT", threshold: "BLOCK_NONE" },
                { category: "DANGEROUS_CONTENT", threshold: "BLOCK_NONE" },
                { category: "SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" }
              ]
            }')

          # 3. Apelul API către v1beta1 (singurul unde stă 2.0 Flash-ul tău)
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "X-Goog-User-Project: $PROJECT_ID" \
            -d "$PROMPT_DATA" \
            "https://$LOCATION-aiplatform.googleapis.com/v1beta1/projects/$PROJECT_NUMBER/locations/$LOCATION/publishers/google/models/$MODEL_ID:generateContent")

          # 4. Debugging inteligent
          if ! echo "$RESPONSE" | jq -e '.candidates[0].content.parts[0].text' > /dev/null 2>&1; then
            echo "❌ EROARE CRITICĂ API:"
            # Dacă e tot 404, înseamnă că Model ID-ul are alt format
            if echo "$RESPONSE" | grep -q "404"; then
                echo "Modelul $MODEL_ID tot nu e găsit. Încercăm varianta scurtă..."
            fi
            echo "$RESPONSE" | jq '.'
            exit 1
          fi

          # 5. Salvare briefing
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > briefing_output.md
          echo "✅ SUCCES! Briefing creat: $(wc -l < briefing_output.md) linii."
          
      - name: Commit and Push
        shell: bash
        run: |
          set -euo pipefail
          DATE_PATH="briefings/$(date +%Y/%m)"
          mkdir -p "$DATE_PATH"
          mv briefing_output.md "$DATE_PATH/$(date +%F).md"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DATE_PATH"
          git commit -m "docs: daily briefing $(date +%F)" || exit 0
          git push
