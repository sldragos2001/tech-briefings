name: Daily Tech Briefing (GCP Native)

on:
  schedule:
    - cron: '58 8 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # Necesar pentru OIDC

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PROJECT_ID: "project-f90c6781-8350-497f-bc7"
      LOCATION: "europe-west4"
      WORKLOAD_IDENTITY_PROVIDER: "projects/832877221895/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      SERVICE_ACCOUNT: "briefing-generator@project-f90c6781-8350-497f-bc7.iam.gserviceaccount.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate Briefing via Vertex AI
        shell: bash
        run: |
          set -euo pipefail
          
          # 1. Configurație: Olanda este "safe bet" pentru conturile din EU
          PROJECT_ID="project-f90c6781-8350-497f-bc7"
          PROJECT_NUMBER="832877221895"
          LOCATION="europe-west4"
          MODEL_ID="gemini-1.5-flash" # Cel mai stabil model din catalog

          echo "🌍 Încercăm în Olanda ($LOCATION) cu $MODEL_ID..."

          # 2. Payload minimal (Fără safety settings ca să evităm erori de tip 400)
          PROMPT_DATA=$(jq -n \
            --arg prompt "Act as a senior engineering analyst. Generate a tech briefing for AI, Cloud Computing, and DevOps. 2 items each. Language: English. Format: Markdown. Target 450-650 words. Include TL;DR. Today is $(date +%F)." \
            '{
              contents: [{ parts: [{ text: $prompt }] }],
              generationConfig: { 
                maxOutputTokens: 2048, 
                temperature: 0.2 
              }
            }')

          # 3. Apelul API - Folosim v1 (producție) pentru stabilitate maximă
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "X-Goog-User-Project: $PROJECT_ID" \
            -d "$PROMPT_DATA" \
            "https://$LOCATION-aiplatform.googleapis.com/v1/projects/$PROJECT_NUMBER/locations/$LOCATION/publishers/google/models/$MODEL_ID:generateContent")

          # 4. Diagnostic & Parsare
          if ! echo "$RESPONSE" | jq -e '.candidates[0].content.parts[0].text' > /dev/null 2>&1; then
            echo "❌ EROARE ÎNCĂ PREZENTĂ:"
            echo "$RESPONSE" | jq '.'
            
            # Plan B: Dacă dă tot 404, încercăm varianta "beta" automat
            echo "🔄 Încercăm varianta v1beta1..."
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer $(gcloud auth print-access-token)" \
              -H "Content-Type: application/json; charset=utf-8" \
              -H "X-Goog-User-Project: $PROJECT_ID" \
              -d "$PROMPT_DATA" \
              "https://$LOCATION-aiplatform.googleapis.com/v1beta1/projects/$PROJECT_NUMBER/locations/$LOCATION/publishers/google/models/$MODEL_ID:generateContent")
          fi

          # 5. Salvare finală
          TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')
          
          if [ -z "$TEXT" ] || [ "$TEXT" == "null" ]; then
            echo "❌ Eșec total în $LOCATION. Răspuns API:"
            echo "$RESPONSE"
            exit 1
          fi

          echo "$TEXT" > briefing_output.md
          echo "✅ VICTORIE! Briefing generat în $LOCATION."
          
      - name: Commit and Push
        shell: bash
        run: |
          set -euo pipefail
          DATE_PATH="briefings/$(date +%Y/%m)"
          mkdir -p "$DATE_PATH"
          mv briefing_output.md "$DATE_PATH/$(date +%F).md"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DATE_PATH"
          git commit -m "docs: daily briefing $(date +%F)" || exit 0
          git push
