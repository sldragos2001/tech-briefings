name: Daily Tech Briefing (GCP Native)

on:
  schedule:
    - cron: '58 8 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # Necesar pentru OIDC

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PROJECT_ID: "project-f90c6781-8350-497f-bc7"
      LOCATION: "europe-west1"
      WORKLOAD_IDENTITY_PROVIDER: "projects/832877221895/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      SERVICE_ACCOUNT: "briefing-generator@project-f90c6781-8350-497f-bc7.iam.gserviceaccount.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate Briefing via Vertex AI
        shell: bash
        run: |
          set -euo pipefail
          
          # 1. Verificăm dacă putem genera un token (Sanity Check)
          TOKEN=$(gcloud auth print-access-token)
          if [ -z "$TOKEN" ]; then
            echo "FATAL: Could not generate GCP Access Token."
            exit 1
          fi

          # 2. Construim payload-ul
          PROMPT_DATA=$(jq -n \
            --arg prompt "Act as a senior engineering analyst. Generate a tech briefing for AI, Cloud Computing, and DevOps. 2 items each. Language: English. Format: Markdown. Target 450-650 words. Include TL;DR. Today is $(date +%F)." \
            '{
              contents: [{ parts: [{ text: $prompt }] }],
              generationConfig: { maxOutputTokens: 2048, temperature: 0.2 }
            }')

          # 3. Apel API cu Verbose Logging
          # Salvam output-ul intr-un fisier temporar pentru a-l putea citi chiar daca curl crapa
          echo "Calling API at ${{ env.LOCATION }}..."
          
          HTTP_STATUS=$(curl -s -w "%{http_code}" -o response_raw.json \
            -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "X-Goog-User-Project: ${{ env.PROJECT_ID }}" \
            -d "$PROMPT_DATA" \
            "https://${{ env.LOCATION }}-aiplatform.googleapis.com/v1/projects/${{ env.PROJECT_ID }}/locations/${{ env.LOCATION }}/publishers/google/models/gemini-1.5-flash:generateContent")

          echo "HTTP Status: $HTTP_STATUS"

          # 4. Verificare Status Code
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "FATAL: API Request failed with status $HTTP_STATUS"
            cat response_raw.json | jq '.' || cat response_raw.json
            exit 1
          fi

          # 5. Extracție text
          jq -r '.candidates[0].content.parts[0].text // empty' response_raw.json > briefing_output.md

          # 6. Final Check
          if [ ! -s briefing_output.md ]; then
            echo "FATAL: briefing_output.md is empty after parsing."
            cat response_raw.json
            exit 1
          fi
          
          echo "Success: Briefing generated."

      - name: Commit and Push
        shell: bash
        run: |
          set -euo pipefail
          DATE_PATH="briefings/$(date +%Y/%m)"
          mkdir -p "$DATE_PATH"
          mv briefing_output.md "$DATE_PATH/$(date +%F).md"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DATE_PATH"
          git commit -m "docs: daily briefing $(date +%F)" || exit 0
          git push
