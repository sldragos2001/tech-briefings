name: Daily Tech Briefing (GCP Native)

on:
  schedule:
    - cron: '58 8 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # Necesar pentru OIDC

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PROJECT_ID: "project-f90c6781-8350-497f-bc7"
      LOCATION: "us-central1"
      WORKLOAD_IDENTITY_PROVIDER: "projects/832877221895/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      SERVICE_ACCOUNT: "briefing-generator@project-f90c6781-8350-497f-bc7.iam.gserviceaccount.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate Briefing (The 2026 Stable Version)
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          set -euo pipefail
          
          # Folosim alias-ul care "nu expiră" niciodată
          MODEL_ID="gemini-flash-latest"
          echo "🚀 Generăm briefing-ul folosind $MODEL_ID..."

          PROMPT_DATA=$(jq -n \
            --arg prompt "Act as a senior engineering analyst. Generate a tech briefing for AI, Cloud Computing, and DevOps. 2 items each. Language: English. Format: Markdown. Target 450-650 words. Include TL;DR. Today is $(date +%F)." \
            '{
              contents: [{ parts: [{ text: $prompt }] }],
              generationConfig: { 
                maxOutputTokens: 4096, 
                temperature: 0.1 
              }
            }')

          # Apel către endpoint-ul de v1beta (confirmat funcțional în Cloud Shell)
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PROMPT_DATA" \
            "https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${GEMINI_API_KEY}")

          # Verificăm dacă am primit text (Gemini 2.5/3.1 au aceeași structură JSON)
          if ! echo "$RESPONSE" | jq -e '.candidates[0].content.parts[0].text' > /dev/null 2>&1; then
            echo "❌ EROARE API DETECTATĂ:"
            echo "$RESPONSE" | jq '.'
            exit 1
          fi

          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > briefing_output.md
          echo "✅ SUCCES! Briefing generat cu $MODEL_ID."
          
      - name: Commit and Push
        shell: bash
        run: |
          set -euo pipefail
          DATE_PATH="briefings/$(date +%Y/%m)"
          mkdir -p "$DATE_PATH"
          mv briefing_output.md "$DATE_PATH/$(date +%F).md"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DATE_PATH"
          git commit -m "docs: daily briefing $(date +%F)" || exit 0
          git push
