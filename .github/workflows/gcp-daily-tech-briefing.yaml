name: Daily Tech Briefing (GCP Native)

on:
  schedule:
    - cron: '58 8 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # Necesar pentru OIDC

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PROJECT_ID: "project-f90c6781-8350-497f-bc7"
      LOCATION: "europe-west1"
      WORKLOAD_IDENTITY_PROVIDER: "projects/832877221895/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      SERVICE_ACCOUNT: "briefing-generator@project-f90c6781-8350-497f-bc7.iam.gserviceaccount.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate Briefing via Vertex AI
        shell: bash
        run: |
          set -euo pipefail
          
          # 1. Definire variabile (Gemini 2.0 Flash este modelul identificat în screenshot)
          PROJECT_NUMBER="832877221895"
          MODEL_ID="gemini-2.0-flash-001"
          LOCATION="europe-west1"
          
          echo "Using model: $MODEL_ID in $LOCATION"

          # 2. Construim payload-ul JSON
          PROMPT_DATA=$(jq -n \
            --arg prompt "Act as a senior engineering analyst. Generate a tech briefing for AI, Cloud Computing, and DevOps. 2 items each. Language: English. Format: Markdown. Target 450-650 words. Include TL;DR. Today is $(date +%F)." \
            '{
              contents: [{ parts: [{ text: $prompt }] }],
              generationConfig: { 
                maxOutputTokens: 2048, 
                temperature: 0.2 
              }
            }')

          # 3. Apel API - Folosim calea oficială pentru Gemini 2.0
          # Am inclus header-ul X-Goog-User-Project pentru a asigura accesul la cote
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "X-Goog-User-Project: ${{ env.PROJECT_ID }}" \
            -d "$PROMPT_DATA" \
            "https://$LOCATION-aiplatform.googleapis.com/v1/projects/$PROJECT_NUMBER/locations/$LOCATION/publishers/google/models/$MODEL_ID:generateContent")

          # 4. Verificare erori API
          if echo "$RESPONSE" | jq -e '.error' > /dev/null; then
            echo "FATAL: GCP API Error detected:"
            echo "$RESPONSE" | jq '.'
            exit 1
          fi

          # 5. Extracție text din formatul Unary (Gemini 2.0 returnează direct obiectul în v1)
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty' > briefing_output.md

          # 6. Sanity check: verificăm dacă fișierul are conținut
          if [ ! -s briefing_output.md ] || [ "$(cat briefing_output.md)" == "null" ]; then
            echo "FATAL: Output is empty. API Full Response for debug:"
            echo "$RESPONSE"
            exit 1
          fi
          
          echo "Success: Briefing generated (Size: $(wc -c < briefing_output.md) bytes)"

      - name: Commit and Push
        shell: bash
        run: |
          set -euo pipefail
          DATE_PATH="briefings/$(date +%Y/%m)"
          mkdir -p "$DATE_PATH"
          mv briefing_output.md "$DATE_PATH/$(date +%F).md"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DATE_PATH"
          git commit -m "docs: daily briefing $(date +%F)" || exit 0
          git push
