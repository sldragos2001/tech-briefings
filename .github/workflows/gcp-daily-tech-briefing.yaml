name: Daily Tech Briefing (GCP Native)

on:
  schedule:
    - cron: '58 8 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # Necesar pentru OIDC

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PROJECT_ID: "project-f90c6781-8350-497f-bc7"
      LOCATION: "europe-west1"
      WORKLOAD_IDENTITY_PROVIDER: "projects/832877221895/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      SERVICE_ACCOUNT: "briefing-generator@project-f90c6781-8350-497f-bc7.iam.gserviceaccount.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate Briefing via Vertex AI
        shell: bash
        run: |
          set -euo pipefail
          
          PROJECT_ID="project-f90c6781-8350-497f-bc7"
          PROJECT_NUMBER="832877221895"
          LOCATION="us-central1"
          MODEL_ID="gemini-2.0-flash-001"

          echo "🚀 Ultima sută de metri: Apelăm $MODEL_ID..."

          # Payload corectat cu prefixele HARM_CATEGORY_
          PROMPT_DATA=$(jq -n \
            --arg prompt "Act as a senior engineering analyst. Generate a tech briefing for AI, Cloud Computing, and DevOps. 2 items each. Language: English. Format: Markdown. Target 450-650 words. Include TL;DR. Today is $(date +%F)." \
            '{
              contents: [{ parts: [{ text: $prompt }] }],
              generationConfig: { 
                maxOutputTokens: 2048, 
                temperature: 0.1 
              },
              safetySettings: [
                { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" }
              ]
            }')

          # Apelul către v1beta1
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "X-Goog-User-Project: $PROJECT_ID" \
            -d "$PROMPT_DATA" \
            "https://$LOCATION-aiplatform.googleapis.com/v1beta1/projects/$PROJECT_NUMBER/locations/$LOCATION/publishers/google/models/$MODEL_ID:generateContent")

          # Diagnostic final
          if ! echo "$RESPONSE" | jq -e '.candidates[0].content.parts[0].text' > /dev/null 2>&1; then
            echo "❌ EROARE API (Diagnostic):"
            echo "$RESPONSE" | jq '.'
            exit 1
          fi

          # Salvare succes
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > briefing_output.md
          echo "✅ MISIUNE ÎNDEPLINITĂ! Briefing generat cu succes."
          
      - name: Commit and Push
        shell: bash
        run: |
          set -euo pipefail
          DATE_PATH="briefings/$(date +%Y/%m)"
          mkdir -p "$DATE_PATH"
          mv briefing_output.md "$DATE_PATH/$(date +%F).md"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DATE_PATH"
          git commit -m "docs: daily briefing $(date +%F)" || exit 0
          git push
