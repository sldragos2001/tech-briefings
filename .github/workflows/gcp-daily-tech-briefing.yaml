name: Daily Tech Briefing (GCP Native)

on:
  schedule:
    - cron: '58 8 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # Necesar pentru OIDC

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PROJECT_ID: "project-f90c6781-8350-497f-bc7"
      LOCATION: "us-central1"
      WORKLOAD_IDENTITY_PROVIDER: "projects/832877221895/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
      SERVICE_ACCOUNT: "briefing-generator@project-f90c6781-8350-497f-bc7.iam.gserviceaccount.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate Briefing (The "Real-Time" Version)
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          set -euo pipefail
          
          # 1. Definim variabilele corect
          DISPLAY_DATE=$(date +'%d %b %Y')

          echo "🚀 Generăm briefing-ul pentru $DISPLAY_DATE..."

          # 2. Construim prompt-ul
          # Am înlocuit $date cu $DISPLAY_DATE (care e variabilă de Bash deja setată)
          PROMPT_DATA=$(jq -n \
            --arg display_date "$DISPLAY_DATE" \
            --arg prompt "Act as a senior engineering analyst. Generate the 'Daily Engineering Briefing' for today, $DISPLAY_DATE (Europe/Bucharest).

            STRUCTURE:
            1. Title: 'Daily Tech Briefing — $DISPLAY_DATE'
            2. Sections: AI, Cloud Computing, DevOps. (2 items per section).
            3. Each item MUST follow this format:
               - [Category] — [Headline]
               - [A detailed paragraph about a specific technical update from the last 24-48 hours]
               - 'Kink:' [A witty, cynical, or sharp one-sentence technical insight]
               - 'Why it matters:' [3 bullet points on architectural or business impact]
            4. Footer: A concise 'TL;DR' summary.

            TONE & CONTEXT:
            Use the current 2026 tech stack (Agentic workflows, Wasm-native clouds, Sovereign infra) as the baseline. 
            The tone should be 'OpenAI-esque': punchy, expert-level, and slightly opinionated. 
            No fluff, no future predictions—just today's engineering reality." \
            '{
              contents: [{ parts: [{ text: $prompt }] }],
              generationConfig: { 
                maxOutputTokens: 2500, 
                temperature: 0.8 
              }
            }')

          # 3. Apelul API
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PROMPT_DATA" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${GEMINI_API_KEY}")

          # 4. Parsare și verificare
          if ! echo "$RESPONSE" | jq -e '.candidates[0].content.parts[0].text' > /dev/null 2>&1; then
            echo "❌ EROARE API DETECTATĂ:"
            echo "$RESPONSE" | jq '.'
            exit 1
          fi

          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > briefing_output.md
          echo "✅ Briefing generat cu succes pentru $DISPLAY_DATE."
          
      - name: Commit and Push
        shell: bash
        run: |
          set -euo pipefail
          DATE_PATH="briefings/$(date +%Y/%m)"
          mkdir -p "$DATE_PATH"
          mv briefing_output.md "$DATE_PATH/$(date +%F).md"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DATE_PATH"
          git commit -m "docs: daily briefing $(date +%F)" || exit 0
          git push
